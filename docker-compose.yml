version: '3'

services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    image: payload-app:latest
    ports:
      - '5200:5200'
    environment:
      - NODE_ENV=production
      - PORT=5200
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env

  # Ensure your DATABASE_URL uses 'mongo' as the hostname ie. mongodb://mongo/my-db-name
  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    command:
      - --storageEngine=wiredTiger
    volumes:
      - data:/data/db
    logging:
      driver: none

  # Uncomment the following to use postgres
  # postgres:
  #   restart: always
  #   image: postgres:latest
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  data:
  # pgdata:
  node_modules:
